# ============================================================
#  ChatRoom — Main Application Properties
#  Shared settings used by both HTTP and HTTPS profiles.
#
#  ┌─────────────────────────────────────────────────────────┐
#  │  HOW TO SWITCH BETWEEN HTTP AND HTTPS                   │
#  │                                                         │
#  │  HTTPS (default — required for calls on Android):       │
#  │    spring.profiles.active=https                         │
#  │    → server runs on https://HOST:8443                   │
#  │    → http://HOST:8080 auto-redirects to https           │
#  │                                                         │
#  │  HTTP (plain development, calls only work on localhost): │
#  │    spring.profiles.active=http                          │
#  │    → server runs on http://HOST:8080                    │
#  └─────────────────────────────────────────────────────────┘
# ============================================================
spring.profiles.active=${SPRING_PROFILES_ACTIVE:http}


# ==========================================
# Database — PostgreSQL
# ==========================================
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/chatroom}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
# SECURITY: Use a strong password. Override with env var SPRING_DATASOURCE_PASSWORD in production.
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# NOTE: Use 'validate' or 'none' in production after first run.
spring.jpa.hibernate.ddl-auto=validate


# ==========================================
# File upload limits
# ==========================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB


# ==========================================
# Session
# ==========================================
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax


# ==========================================
# AES-256-GCM Encryption Key
# SECURITY: This is a default dev key.
# Override with env var APP_ENCRYPTION_SECRET in production.
# ==========================================
app.encryption.secret=${APP_ENCRYPTION_SECRET:change_me_in_production_1234567890}

# ==========================================
# Allowed WebSocket origins (comma-separated)
# Override with env var APP_ALLOWED_ORIGINS in production
# ==========================================
app.allowed-origins=${APP_ALLOWED_ORIGINS:*}


# ==========================================
# Maximum message / image / file sizes
# ==========================================
app.max-message-length=10000
app.max-image-bytes=5242880
app.max-file-bytes=8388608
