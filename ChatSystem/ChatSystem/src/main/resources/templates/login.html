<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — ChatRoom</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/uicons-bold-rounded/css/uicons-bold-rounded.css"/>
  <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/uicons-solid-rounded/css/uicons-solid-rounded.css"/>

  <!-- CSS -->
  <link rel="stylesheet" href="/css/variables.css"/>
  <link rel="stylesheet" href="/css/reset.css"/>
  <link rel="stylesheet" href="/css/loading.css"/>
  <link rel="stylesheet" href="/css/header.css"/>
  <link rel="stylesheet" href="/css/home.css"/>
  <link rel="stylesheet" href="/css/themes.css"/>

  <!-- Theme (no defer — must run before render to avoid flash) -->
  <script src="/js/theme.js"></script>

  <!-- Scripts -->
  <script defer src="/js/jquery.js"></script>
  <script defer src="/js/loading.js"></script>
</head>

<body>
  <!-- Loader -->
  <div class="loader_container" id="loader_cont_id">
    <div class="lds-roller" id="loader_main_id">
      <div></div><div></div><div></div><div></div>
      <div></div><div></div><div></div><div></div>
    </div>
    <div class="problem" id="problem_id">
      Do you have any problem? <a href="#">Contact us</a> now.
    </div>
    <div class="by_who" id="by_who_id">by Natiq</div>
  </div>

  <!-- Header -->
  <div th:replace="~{header :: headerFragment}"></div>

  <div class="container_login_and_sign_up_main">
    <div class="container_of_section">

      <!-- Left: marketing text -->
      <div class="section_1">
        <div class="text_wlcm big_text">Welcome back to ChatRoom!</div>
        <div class="text_wlcm small_text">
          A messaging platform that provides users with a secure and user-friendly
          way to communicate with friends and family.
        </div>
      </div>

      <!-- Right: form card -->
      <div class="section_2">
        <form method="POST" th:action="@{/authenticate-user}" class="login_and_signup_cont_inner">

          <div class="form-heading">Sign In</div>

          <!-- Error -->
          <label th:if="${param.error}" class="check">
            Invalid username or password.
          </label>

          <div class="input_cont_main">
            <div class="input_cont">
              <input type="text" name="username" id="username_id" class="input_main" placeholder="Username" required/>
            </div>
            <div class="input_cont" style="position:relative;">
              <input type="password" name="password" id="password" class="input_main" placeholder="Password" style="padding-right:40px;" required/>
              <button type="button" class="pw-toggle-btn" onclick="togglePw('password', this)"><i class="fi fi-rr-eye"></i></button>
            </div>
          </div>

          <div class="buttons_main_cont">
            <button class="button_main_submit" type="submit"><span>Login</span></button>
            <div class="other_info_for_login_and_sign_up">
              <div class="text_wlcm small_text bottom_text">
                Don't have an account? <a th:href="@{/users/create-account}">Sign up</a> now.
              </div>
            </div>
          </div>

        </form>
      </div>

    </div>
  </div>

  <script>
    function togglePw(inputId, btn) {
      var input = document.getElementById(inputId);
      if (input.type === 'password') {
        input.type = 'text';
        btn.querySelector('i').className = 'fi fi-rr-eye-crossed';
      } else {
        input.type = 'password';
        btn.querySelector('i').className = 'fi fi-rr-eye';
      }
    }
  </script>
</body>
</html>
