# ============================================================
#  ChatRoom — HTTPS Profile
#  Active when: spring.profiles.active=https  (the default)
#
#  What happens:
#    • Spring Boot listens on HTTPS port 8443
#    • HttpsRedirectConfig adds a plain-HTTP connector on port 8080
#      that automatically redirects every request to HTTPS
#    • Secure session cookie is enforced
#
#  Keystore: src/main/resources/keystore.p12
#    Generated by the setup wizard (keytool, self-signed, 2 years).
#    For production replace with a real certificate from Let's Encrypt.
# ============================================================

# ── Main HTTPS connector ──────────────────────────────────────
server.port=8443
server.ssl.enabled=true
server.ssl.key-store=classpath:keystore.p12
server.ssl.key-store-password=chatroom_dev
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=chatroom

# ── Secondary plain-HTTP port (only used for redirect, see HttpsRedirectConfig) ──
server.http.port=8080

# ── Secure cookie (required when running HTTPS) ──────────────
server.servlet.session.cookie.secure=true
