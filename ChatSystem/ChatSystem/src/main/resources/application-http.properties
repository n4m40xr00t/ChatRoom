# ============================================================
#  ChatRoom — HTTP Profile  (development only)
#  Active when: spring.profiles.active=http
#
#  ⚠  WARNING: plain HTTP.
#     Video / audio calls will ONLY work when accessed from
#     the same machine (localhost / 127.0.0.1).
#     On Android or any other device on the LAN, getUserMedia
#     will be blocked by the browser because the page is not
#     a "secure context".  Switch to the https profile for
#     cross-device testing.
# ============================================================

server.port=${PORT:8080}
